version: '3.8'

services:
  app:
    build: ./app
    container_name: movieflix_app
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: movieflix_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: movieflix
      POSTGRES_PASSWORD: movieflix
      POSTGRES_DB: movieflix