name: CI MovieFlix

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker
      run: docker build -t movieflix .

    - name: Test container
      run: |
        docker run -d -p 5000:5000 movieflix
        sleep 10
        curl -f http://localhost:5000 || exit 1